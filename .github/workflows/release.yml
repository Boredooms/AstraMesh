name: Release APK

# Builds an installable APK and publishes it as a downloadable asset on a GitHub Release
# whenever a version tag (v*) is pushed. This is the stable, permanent download path for the
# app -- workflow run artifacts (see android.yml) expire after 90 days, but Release assets do
# not.
#
# NOTE: this uses the debug build variant, which Android auto-signs with a debug keystore so
# it installs directly on a device (Settings > allow unknown sources). A release variant would
# need a real signing keystore managed as a CI secret; that's a deliberate follow-up, not
# something to fake with an unsigned APK (which Android refuses to install at all).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Run JVM unit tests
        run: ./gradlew test --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with version tag
        run: |
          mkdir -p release-out
          cp app/build/outputs/apk/debug/app-debug.apk \
             "release-out/AstraMesh-${{ github.ref_name }}-debug-signed.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: astramesh-release-apk
          path: release-out/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        # softprops/action-gh-release makes a single attempt against the GitHub API and fails
        # the whole job on any error, including transient ones -- e.g. a brief 503 from
        # GitHub's own API returning its generic HTML error page instead of JSON ("Unexpected
        # error fetching GitHub release ... HttpError: <!DOCTYPE html>"), which has happened
        # here even though githubstatus.com reported all systems operational at the time.
        # That's a genuine transient blip, not a config or code problem, so retry a few times
        # with backoff before actually failing the job -- the APK build/test/upload-artifact
        # steps above already succeeded and shouldn't need to be redone just because GitHub's
        # release API hiccuped once.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            # Idempotent: if a prior attempt this run partially succeeded (release created but
            # asset upload failed before a retry), delete it first so `release create` doesn't
            # fail with "release already exists" on the next attempt.
            gh release delete "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" --yes 2>/dev/null || true
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "AstraMesh ${{ github.ref_name }}" \
              --generate-notes \
              release-out/*.apk
        env:
          GH_TOKEN: ${{ github.token }}
